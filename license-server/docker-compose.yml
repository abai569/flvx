version: '3.8'

services:
  license-server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - ADMIN_TOKEN=your-secret-token-here
    restart: unless-stopped
    networks:
      - license-network

networks:
  license-network:
    driver: bridge
