<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License 生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .result-box h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .license-key {
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-secondary {
            background: #6c757d;
            flex: 1;
        }
        
        .btn-primary {
            flex: 1;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔑 License 生成器</h1>
            <p class="subtitle">生成 FLVX 面板授权许可</p>
            
            <div id="alert"></div>
            
            <form id="generateForm">
                <div class="form-group">
                    <label for="domain">绑定域名 *</label>
                    <input type="text" id="domain" placeholder="panel.example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="months">授权时长 *</label>
                    <select id="months" required>
                        <option value="1">1 个月</option>
                        <option value="2">2 个月</option>
                        <option value="3" selected>3 个月</option>
                        <option value="6">6 个月</option>
                        <option value="9">9 个月</option>
                        <option value="12">12 个月</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">
                    生成 License
                </button>
            </form>
            
            <div id="result" class="hidden">
                <div class="result-box">
                    <h3>✅ 生成成功</h3>
                    <p><strong>域名:</strong> <span id="resultDomain"></span></p>
                    <p><strong>时长:</strong> <span id="resultMonths"></span> 个月</p>
                    <p><strong>过期时间:</strong> <span id="resultExpiry"></span></p>
                    <h3 style="margin-top: 15px;">License Key:</h3>
                    <div class="license-key" id="resultKey"></div>
                    
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="copyLicense()">复制</button>
                        <button class="btn btn-primary" onclick="downloadLicense()">下载 license.json</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 统计信息</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalStat">-</div>
                    <div class="stat-label">总计</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeStat">-</div>
                    <div class="stat-label">有效</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="revokedStat">-</div>
                    <div class="stat-label">已吊销</div>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="loadStats()">刷新统计</button>
        </div>
    </div>
    
    <script>
        let currentLicense = null;
        
        document.getElementById('generateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const domain = document.getElementById('domain').value;
            const months = parseInt(document.getElementById('months').value);
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.textContent = '生成中...';
            
            try {
                const response = await fetch('/api/v1/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': localStorage.getItem('adminToken') || ''
                    },
                    body: JSON.stringify({ domain, months })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    currentLicense = data.data;
                    showResult(data.data);
                    showAlert('生成成功！', 'success');
                    loadStats();
                } else {
                    showAlert(data.error || '生成失败', 'error');
                }
            } catch (error) {
                showAlert('网络错误：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '生成 License';
            }
        });
        
        function showResult(data) {
            document.getElementById('resultDomain').textContent = data.domain;
            document.getElementById('resultMonths').textContent = data.months;
            document.getElementById('resultExpiry').textContent = data.expired_date;
            document.getElementById('resultKey').textContent = data.license_key;
            document.getElementById('result').classList.remove('hidden');
        }
        
        function copyLicense() {
            if (currentLicense) {
                navigator.clipboard.writeText(currentLicense.license_key);
                showAlert('已复制到剪贴板', 'success');
            }
        }
        
        function downloadLicense() {
            if (currentLicense) {
                const content = {
                    license_key: currentLicense.license_key,
                    domain: currentLicense.domain,
                    months: currentLicense.months,
                    expired_at: currentLicense.expired_at,
                    expired_date: currentLicense.expired_date
                };
                
                const blob = new Blob([JSON.stringify(content, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `license-${currentLicense.domain}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showAlert('已下载 license.json', 'success');
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            setTimeout(() => alert.textContent = '', 5000);
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/v1/stats', {
                    headers: {
                        'X-Admin-Token': localStorage.getItem('adminToken') || ''
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalStat').textContent = data.stats.total;
                    document.getElementById('activeStat').textContent = data.stats.active;
                    document.getElementById('revokedStat').textContent = data.stats.revoked;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
